<!DOCTYPE html>
<html lang="zh-CN">
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <title>探星阁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #0057b8;
            --text-main: #1a1a1a;
            --text-secondary: #555555;
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --border: #e5e7eb;
        }
        body {
            font-family: "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }
        /* 头部导航 */
        .header {
            padding: 60px 0 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .header-slogan {
            font-size: 1.1rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }
        /* 关于板块 */
        .about-section {
            margin-bottom: 60px;
        }
        .about-section h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 16px;
            border-left: 4px solid var(--primary);
        }
        .about-section p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.9;
            max-width: 900px;
        }
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 80px;
        }
        .card-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            border-color: var(--primary);
        }
        .card-img {
            width: 100%;
            height: 190px;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card-item:hover .card-img img {
            transform: scale(1.05);
        }
        .card-content {
            padding: 28px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .card-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            flex: 1;
        }
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        /* 响应式适配 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .about-section h2 {
                font-size: 1.5rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="header" id="home">
            <h1>探星阁</h1>
            <div class="header-subtitle">求真 向善</div>
        </div>

        <div class="content-section" id="about">
            <h2>关于本网站</h2>
            <p>本网站是探星阁官方网站，致力于分享学习资源，搭建知识桥梁。不论你是专业学生、学者，还是业余爱好者，在此都能找到自己的乐趣。点击下方卡片，开启你的探索之旅！</p>
        </div>

        <!-- 核心：三个功能卡片 -->
        <div class="card-grid">
            <!-- 卡片1：关于探星阁 -->
            <a href="about-txg.html" class="card-item">
                <div class="card-img">     
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main1.jpg">
                </div>
                <div class="card-content">
                    <div class="card-title">关于探星阁</div>
                    <div class="card-desc">了解探星阁的发展历程、团队介绍及核心宗旨</div>
                </div>
            </a>

            <!-- 卡片2：学科讲义 -->
            <a href="lecturenotes/lecture-notes.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main2.jpg">
                </div>
                <div class="card-content">
                    <div class="card-title">学习资源（科学）</div>
                    <div class="card-desc"> 获取讲义、课件等学习资源</div>
                </div>
            </a>

              <!-- 卡片3：科普资源 -->
            <a href="pop-sci/pop-sci.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main3.jpg" >
                </div>
                <div class="card-content">
                    <div class="card-title">科普资源</div>
                    <div class="card-desc">获取有趣又严谨的科普资源</div>
                </div>
            </a>
            <!-- 卡片4：科学社区 -->
            <a href="sci-com/sci-com.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main4.jpg">
                </div>
                <div class="card-content">
                    <div class="card-title">探星阁社区</div>
                    <div class="card-desc">搭建学习成长的交流平台</div>
                </div>
            </a>
            <!-- 卡片：联系我们 -->
            <a href="contact-us.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="https://picsum.photos/seed/contact/600/400" alt="联系我们 - 天文物理交流">
                </div>
                <div class="card-content">
                    <div class="card-title">联系我们</div>
                    <div class="card-desc">官方邮箱、微信公众号</div>
                </div>
            </a>
        </div>
    </div>

    <!-- 页脚 -->
        <footer class="footer">
            <p>© 2026 探星阁</p>
        </footer>
    </div>
</body>
</html>
