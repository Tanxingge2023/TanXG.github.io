<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 正确配置jpg格式的favicon -->
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <title>探星阁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        /* 学术风主题变量，一键改色 */
        :root {
            --primary: #0057b8;
            --text-main: #1a1a1a;
            --text-secondary: #555555;
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.12);
        }
        body {
            font-family: "Helvetica Neue", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 内容容器适配原结构 */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        /* 学术风头部样式 */
        .header {
            text-align: center;
            margin: 40px 0;
            padding: 40px 30px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            position: relative;
            z-index: 1;
        }
        .header-subtitle {
            font-size: 1.1rem;
            margin-top: 10px;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }
        /* 关于板块样式 */
        .content-section {
            margin-bottom: 60px;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .content-section h2 {
            color: var(--text-main);
            font-size: 1.8rem;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 10px;
            padding-left: 16px;
            border-left: 4px solid var(--primary);
        }
        .content-section h2::after {
            display: none;
        }
        .content-section p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        /* 卡片网格布局 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }
        /* 学术风卡片样式 */
        .card-item {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* 卡片悬浮效果 */
        .card-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary);
        }
        .card-item::before {
            display: none;
        }
        /* 卡片图片区域 */
        .card-img {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
            background: #f0f0f0;
        }
        .card-img::after {
            display: none;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            display: block;
        }
        .card-item:hover .card-img img {
            transform: scale(1.06);
            filter: none;
        }
        /* 卡片内容区域 */
        .card-content {
            padding: 25px;
            text-align: center;
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .card-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .content-section h2 {
                font-size: 1.5rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .card-img {
                height: 180px;
            }
            .card-title {
                font-size: 1.3rem;
            }
            .header {
                padding: 30px 20px;
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="header" id="home">
            <h1>探星阁</h1>
            <div class="header-subtitle">求真 向善</div>
        </div>

        <div class="content-section" id="about">

        </div>

        <!-- 核心：三个功能卡片 -->
        <div class="card-grid">
            <!-- 卡片1：关于探星阁 -->
            <a href="about-txg.html" class="card-item">
                <div class="card-img">     
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main1.jpg">
                </div>
                <div class="card-content">

                </div>
                <div class="card-content">

              <!-- 卡片3：科普资源 -->
            <a href="pop-sci/pop-sci.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main3.jpg" >
                </div>
                <div class="card-content">
                    <div class="card-title">科普资源</div>
                    <div class="card-desc">获取有趣又严谨的科普资源</div>

            </a>
            <!-- 卡片4：科学社区 -->
            <a href="sci-com/sci-com.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="main4.jpg">
                </div>
                <div class="card-content">
                    <div class="card-title">探星阁社区</div>

                </div>
            </a>
            <!-- 卡片：联系我们 -->
            <a href="contact-us.html" class="card-item">
                <div class="card-img">
                    <!-- 替换成你的图片地址，建议尺寸：300x200 -->
                    <img src="https://picsum.photos/seed/contact/600/400" alt="联系我们 - 天文物理交流">
                </div>
                <div class="card-content">

                    <div class="card-desc">官方邮箱、微信公众号</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
