<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../logo.jpg" type="image/jpeg">
    <title>探星阁社区</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        /* 学术风主题变量，一键改色 */
        :root {
            --primary: #0057b8;
            --text-main: #1a1a1a;
            --text-secondary: #555555;
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.12);
        }
        body {
            font-family: "Helvetica Neue", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 内容容器适配原结构 */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        /* 学术风头部样式 */
        .header {
            text-align: center;
            margin: 40px 0;
            padding: 40px 30px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            position: relative;
            z-index: 1;
        }
        .header-subtitle {
            font-size: 1.1rem;
            margin-top: 10px;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }
        /* 关于板块样式 */
        .content-section {
            margin-bottom: 60px;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .content-section h2 {
            color: var(--text-main);
            font-size: 1.8rem;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 10px;
            padding-left: 16px;
            border-left: 4px solid var(--primary);
        }
        .content-section h2::after {
            display: none;
        }
        .content-section p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        /* 卡片网格布局 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }
        /* 学术风卡片样式 */
        .card-item {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* 卡片悬浮效果 */
        .card-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary);
        }
        .card-item::before {
            display: none;
        }
        /* 卡片图片区域 */
        .card-img {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
            background: #f0f0f0;
        }
        .card-img::after {
            display: none;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            display: block;
        }
        .card-item:hover .card-img img {
            transform: scale(1.06);
            filter: none;
        }
        /* 卡片内容区域 */
        .card-content {
            padding: 25px;
            text-align: center;
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .card-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .content-section h2 {
                font-size: 1.5rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .card-img {
                height: 180px;
            }
            .card-title {
                font-size: 1.3rem;
            }
            .header {
                padding: 30px 20px;
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- 返回按钮 -->
        <a href="../index.html" class="back-btn">← 返回首页</a>

        <!-- 头部标题 -->
        <div class="header">
            <h1>探星阁社区</h1>
        </div>

        <!-- 资源说明区域 -->
        <div class="content-section">
            <p>探星阁社区旨在搭建一个交流学习、分享经验、互相成长的平台。这里既有他人的成长故事、心路历程，也有学习经验、学习方法，还有学习工具的分享、使用教程等等。欢迎进入探星阁的大家庭！也欢迎投稿分享你的成长故事！</p>
        </div>

        <!-- 科普资源卡片 -->
        <div class="content-section">
            <h2>科研之友</h2>
            <div class="sub-card-grid">
                <div class="sub-card" onclick="openPdf('../sci-com/科研之友/手把手教你养龙虾，openclaw纯干货操作指南（一.pdf')">
                    <img src="../sci-com/科研之友/Openclaw.jpg" alt="Openclaw纯干货操作指南（一）封面">
                    <h3>手把手教你养龙虾｜Openclaw纯干货操作指南（一）</h3>
                </div>
            </div>
        </div>

        <div class="content-section">
            <h2>成长故事</h2>
            <div class="sub-card-grid">
                <div class="sub-card" onclick="openPdf('../sci-com/成长故事/谨以此文致敬我的高中时代（郭君）.pdf')">
                    <img src="../sci-com/成长故事/怀念高中生活（郭君）.jpg" alt="怀念高中生活（郭君）封面">
                    <h3>怀念高中生活（郭君）</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 鼠标移动粒子层跟随：保留原有效果
        document.addEventListener('mousemove', function(e) {
            if (this.lastMoveTime && Date.now() - this.lastMoveTime < 10) return;
            this.lastMoveTime = Date.now();
            
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            document.querySelector('body::before').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // 简化版openPdf：无任何提示，直接打开
        function openPdf(pdfUrl) {
            window.open(pdfUrl, '_self');
        }

        // 移动端触摸优化
        document.addEventListener('touchstart', function() {}, { passive: true });
    </script>
</body>
</html>
